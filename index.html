<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyrics Maker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <h1>Lyrics Maker</h1>
    </div>
    <p>Write lyrics, see phonetics, find rhymes</p>
    <div class="history-buttons">
      <button id="undo-btn" class="history-btn" disabled title="Undo (Ctrl+Z)">&#x21A9;</button>
      <button id="redo-btn" class="history-btn" disabled title="Redo (Ctrl+Shift+Z)">&#x21AA;</button>
    </div>
  </header>
  <main class="app-container">
    <div id="lines-container"></div>
    <button id="add-line-btn" class="add-line-btn">+ Add line</button>
  </main>

  <script src="js/languages.js"></script>
  <script src="js/ipa.js"></script>
  <script src="js/rhyme.js"></script>
  <script src="js/line.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
